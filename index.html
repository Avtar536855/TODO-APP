<html lang="en">
<head>

    <title>Document</title><link rel="stylesheet" href="todo.css">

<body>
    <div class="todo-container">

        <h1>TODO</h1>
        <div class="BOX">
                 <label for="todo-title">Title</label>
                 <input type="text" id="todo-title" placeholder="Enter your task here">

                    <li></li>
                 </ul>
            </div>
        </div>
        
    </div>
